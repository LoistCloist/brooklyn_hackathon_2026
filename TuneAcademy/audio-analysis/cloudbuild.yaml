steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/musilearn-api:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/musilearn-api:latest'
      - '.'
    id: build

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/musilearn-api:latest']
    id: push
    waitFor: ['build']

images:
  - 'gcr.io/$PROJECT_ID/musilearn-api:latest'
